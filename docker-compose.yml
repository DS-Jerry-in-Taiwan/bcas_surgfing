services:
  postgres:
    image: postgres:14
    container_name: bcas_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cbas
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  pipeline:
    build: .
    container_name: bcas_pipeline
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: cbas
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - ./logs:/app/logs
      - ./src:/app/src
    command: ["python3", "src/run_daily.py"]

  scheduler:
    build: ./scheduler
    container_name: bcas_scheduler
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PIPELINE_DIR: /app/pipeline
      SCHEDULER_PORT: "8080"
      SCHEDULER_CRON: "0 10 * * 1-5"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: cbas
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "8080:8080"
    volumes:
      - ./logs:/app/logs
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - default
    command: ["./scheduler"]

volumes:
  pgdata:
